syntax = "proto3";

package static_analyzer;

service StaticAnalyzer {
  rpc IndexFiles(IndexFilesRequest) returns (IndexFilesResponse);
  rpc CandidateScan(CandidateScanRequest) returns (CandidateScanResponse);
  rpc AstScan(AstScanRequest) returns (AstScanResponse);
  rpc CallGraph(CallGraphRequest) returns (CallGraphResponse);
  rpc FunctionSummary(FunctionSummaryRequest) returns (FunctionSummaryResponse);
  rpc InterproceduralFlow(InterproceduralFlowRequest) returns (InterproceduralFlowResponse);
  rpc PathConstraints(PathConstraintsRequest) returns (PathConstraintsResponse);
  rpc OwnershipSummary(OwnershipSummaryRequest) returns (OwnershipSummaryResponse);
  rpc OwnershipConventions(OwnershipConventionsRequest) returns (OwnershipConventionsResponse);
  rpc LeakguardRun(LeakguardRunRequest) returns (LeakguardRunResponse);
  rpc LeakguardGetReport(LeakguardGetReportRequest) returns (LeakguardGetReportResponse);
}

message IndexFilesRequest {
  string root_path = 1;
  optional int32 file_limit = 2;
  repeated string exclude_patterns = 3;
}

message IndexFilesResponse {
  repeated string files = 1;
  int32 total_count = 2;
  repeated string errors = 3;
}

message CandidateScanRequest {
  string file_path = 1;
  string content = 2;
}

message CandidateScanResponse {
  repeated LeakCandidate candidates = 1;
}

message AstScanRequest {
  string file_path = 1;
  string content = 2;
}

message AstScanResponse {
  repeated AstNode nodes = 1;
}

message CallGraphRequest {
  string root_path = 1;
  repeated string files = 2;
}

message CallGraphResponse {
  repeated CallGraphEdge edges = 1;
  repeated CallGraphNode nodes = 2;
}

message FunctionSummaryRequest {
  string file_path = 1;
  string content = 2;
  string function_name = 3;
}

message FunctionSummaryResponse {
  string summary = 1;
  repeated string allocations = 2;
  repeated string frees = 3;
}

message InterproceduralFlowRequest {
  string root_path = 1;
  string function_name = 2;
  repeated string files = 3;
}

message InterproceduralFlowResponse {
  repeated FlowPath paths = 1;
}

message PathConstraintsRequest {
  string file_path = 1;
  string content = 2;
  int32 line_number = 3;
}

message PathConstraintsResponse {
  repeated string constraints = 1;
  repeated string feasible_paths = 2;
}

message OwnershipSummaryRequest {
  repeated string files = 1;
  string root_path = 2;
}

message OwnershipSummaryResponse {
  repeated OwnershipInfo ownerships = 1;
}

message OwnershipConventionsRequest {
  string content = 1;
  string file_path = 2;
}

message OwnershipConventionsResponse {
  repeated OwnershipRule rules = 1;
}

message LeakguardRunRequest {
  string project_path = 1;
  string build_command = 2;
  optional int32 timeout_sec = 3;
}

message LeakguardRunResponse {
  bool success = 1;
  string run_id = 2;
  string output = 3;
}

message LeakguardGetReportRequest {
  string run_id = 1;
}

message LeakguardGetReportResponse {
  string report = 1;
  repeated LeakCandidate findings = 2;
}

// Shared types
message LeakCandidate {
  string id = 1;
  string function_name = 2;
  string file_path = 3;
  int32 line_number = 4;
  string allocation_site = 5;
  string allocation_type = 6;
  string confidence = 7;
  string context = 8;
}

message AstNode {
  string type = 1;
  int32 start_line = 2;
  int32 end_line = 3;
  int32 start_col = 4;
  int32 end_col = 5;
  string text = 6;
  repeated AstNode children = 7;
}

message CallGraphEdge {
  string caller = 1;
  string callee = 2;
  string file_path = 3;
  int32 line_number = 4;
}

message CallGraphNode {
  string function_name = 1;
  string file_path = 2;
}

message FlowPath {
  string function_name = 1;
  string file_path = 2;
  repeated int32 lines = 3;
}

message OwnershipInfo {
  string function_name = 1;
  string file_path = 2;
  string ownership_type = 3;
  repeated string allocated_objects = 4;
}

message OwnershipRule {
  string pattern = 1;
  string description = 2;
  string convention_type = 3;
}
