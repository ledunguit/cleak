services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mcpvul
      POSTGRES_PASSWORD: mcpvul
      POSTGRES_DB: mcpvul
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpvul"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mcpvul-net

  control-plane:
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: mcpvul
      POSTGRES_PASSWORD: mcpvul
      POSTGRES_DB: mcpvul
      STATIC_ANALYZER_URL: static-analyzer:50051
      DYNAMIC_ANALYZER_URL: dynamic-analyzer:50052
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8090/api/github/callback}
      GITHUB_CLONE_ROOT: /clones
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - clones:/clones
      - ./demo:/workspace/demo
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mcpvul-net
    restart: unless-stopped

  static-analyzer:
    build:
      context: .
      dockerfile: apps/static-analyzer/Dockerfile
    ports:
      - "50051:50051"
    environment:
      GRPC_URL: 0.0.0.0:50051
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./demo:/workspace/demo
    depends_on:
      - leakguard-runtime
    networks:
      - mcpvul-net
    restart: unless-stopped

  dynamic-analyzer:
    build:
      context: .
      dockerfile: apps/dynamic-analyzer/Dockerfile
    ports:
      - "50052:50052"
    environment:
      GRPC_URL: 0.0.0.0:50052
      RUNS_DIR: /runs
    volumes:
      - runs:/runs
      - ./demo:/workspace/demo
    networks:
      - mcpvul-net
    restart: unless-stopped

  leakguard-runtime:
    image: leakguard-tool:dev
    build:
      context: ./tools/leak_guard_tool
    networks:
      - mcpvul-net

  leak-inspector-ui:
    build:
      context: .
      dockerfile: apps/leak-inspector-ui/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - control-plane
    networks:
      - mcpvul-net

volumes:
  pgdata:
  clones:
  runs:

networks:
  mcpvul-net:
    driver: bridge
