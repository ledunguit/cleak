# Analyzer stack for leak-inspector-tui.
# The TUI drives these two analyzers directly over MCP/HTTP (static :50061,
# dynamic :50062). There is no control-plane / web UI / database — the TUI is a
# standalone scanner that writes its report artifacts to disk.
services:
  static-analyzer:
    build:
      context: .
      dockerfile: apps/static-analyzer/Dockerfile
    # Bound to localhost only: this is an internal, UNAUTHENTICATED MCP service
    # the TUI reaches over the docker network. Publishing to 0.0.0.0 would expose
    # untrusted-code execution to the LAN.
    ports:
      - "127.0.0.1:50061:50061"
    env_file:
      - apps/static-analyzer/.env
    environment:
      # Analyzer serves MCP/HTTP only (the sole transport).
      MCP_HTTP_PORT: 50061
      # Per-project FACTORY allocators (≈ LAMeD AllocSource) — comma-separated
      # function names whose return value is owned heap but whose name carries no
      # malloc/alloc token (e.g. cJSON_Duplicate). Empty by default.
      EXTRA_ALLOCATOR_NAMES: ${EXTRA_ALLOCATOR_NAMES:-}
    volumes:
      - ./demo:/workspace/demo
      - ./targets:/workspace/targets
    networks:
      - mcpvul-net
    restart: unless-stopped

  dynamic-analyzer:
    build:
      context: .
      dockerfile: apps/dynamic-analyzer/Dockerfile
    # Localhost-only (see static-analyzer note): internal, unauthenticated service.
    ports:
      - "127.0.0.1:50062:50062"
    env_file:
      - apps/dynamic-analyzer/.env
    environment:
      # Analyzer serves MCP/HTTP only (the sole transport).
      MCP_HTTP_PORT: 50062
      # Container runs dir (override any host path in the app .env).
      RUNS_DIR: /runs
    volumes:
      - runs:/runs
      - ./demo:/workspace/demo
      - ./targets:/workspace/targets
    networks:
      - mcpvul-net
    restart: unless-stopped

volumes:
  runs:

networks:
  mcpvul-net:
    driver: bridge
