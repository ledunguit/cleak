name: Release

on:
  push:
    branches: [master]

# Avoid overlapping release runs.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the "Version Packages" PR + tags
  pull-requests: write # open/update that PR
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # setup-node writes ~/.npmrc with NODE_AUTH_TOKEN so `changeset publish`
      # (npm under the hood) can authenticate to the registry.
      # Node 22 (current LTS): newer than the EOL-track 20, but tree-sitter@0.25.0
      # still builds on it (Node 24 has no prebuild and fails to compile its C++).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install
        run: bun install --frozen-lockfile

      # If there are pending changesets -> open/update the "Version Packages" PR
      # (bumps versions + writes CHANGELOGs). When that PR merges (no pending
      # changesets) -> build + publish the changed packages to npm.
      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
